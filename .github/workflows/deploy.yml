name: Deploy to Droplet

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 134.122.104.215
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          envs: MAILERLITE_API_KEY
          script: |
            cd /opt/community-digest
            git fetch origin
            git reset --hard origin/main
            npm ci --omit=dev
            python3 -c "
import re, os
content = open('.env').read()
def upsert(content, key, val):
    if key + '=' in content:
        return re.sub(r'^' + key + r'=.*$', key + '=' + val, content, flags=re.MULTILINE)
    return content + '\n' + key + '=' + val
content = upsert(content, 'MAILERLITE_API_KEY', os.environ['MAILERLITE_API_KEY'])
content = upsert(content, 'FROM_EMAIL', 'digest@newsletter.itqan.dev')
open('.env', 'w').write(content)
"
            pm2 restart digest-server --update-env
            sleep 3
            curl -sf http://localhost:3000/health || (pm2 logs digest-server --lines 20 && exit 1)
