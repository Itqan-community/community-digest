name: Deploy to Droplet

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 134.122.104.215
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          envs: MAILERLITE_API_KEY
          script: |
            cd /opt/community-digest
            git fetch origin
            git reset --hard origin/main
            npm ci --omit=dev
            python3 -c "
import re, os
key = os.environ['MAILERLITE_API_KEY']
with open('.env', 'r') as f: content = f.read()
if 'MAILERLITE_API_KEY=' in content:
    content = re.sub(r'^MAILERLITE_API_KEY=.*$', 'MAILERLITE_API_KEY=' + key, content, flags=re.MULTILINE)
else:
    content += '\nMAILERLITE_API_KEY=' + key
with open('.env', 'w') as f: f.write(content)
"
            pm2 restart digest-server --update-env
            sleep 3
            curl -sf http://localhost:3000/health || (pm2 logs digest-server --lines 20 && exit 1)
