name: Deploy to Droplet

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 134.122.104.215
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          envs: MAILERLITE_API_KEY
          script: |
            cd /opt/community-digest
            git fetch origin
            git reset --hard origin/main
            npm ci --omit=dev
            python3 << 'PYEOF'
            import re, os
            def upsert(c, k, v):
                return re.sub(r'^' + k + r'=.*$', k + '=' + v, c, flags=re.MULTILINE) if k + '=' in c else c + '\n' + k + '=' + v
            c = open('/opt/community-digest/.env').read()
            c = upsert(c, 'MAILERLITE_API_KEY', os.environ['MAILERLITE_API_KEY'])
            c = upsert(c, 'FROM_EMAIL', 'digest@newsletter.itqan.dev')
            open('/opt/community-digest/.env', 'w').write(c)
            PYEOF
            pm2 restart digest-server --update-env
            sleep 3
            curl -sf http://localhost:3000/health || (pm2 logs digest-server --lines 20 && exit 1)
