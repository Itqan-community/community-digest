name: Deploy to Droplet

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 134.122.104.215
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            cd /opt/community-digest
            git fetch origin
            git reset --hard origin/main
            npm ci --omit=dev
            pm2 restart digest-server --update-env
            sleep 3
            curl -sf http://localhost:3000/health || (pm2 logs digest-server --lines 20 && exit 1)
